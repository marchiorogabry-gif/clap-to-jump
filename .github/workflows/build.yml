name: Build Geode Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Setup Geode SDK
        run: |
          curl -L https://github.com/geode-sdk/cli/releases/latest/download/geode-cli-linux.zip -o cli.zip
          unzip cli.zip
          chmod +x geode
          sudo mv geode /usr/local/bin/
          geode sdk install --path $HOME/geode-sdk
          geode sdk install-binaries --platform android64

      - name: Build mod
        run: |
          export GEODE_SDK=$HOME/geode-sdk
          export ANDROID_NDK_ROOT=$ANDROID_NDK
          cmake -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-23
          cmake --build build --config RelWithDebInfo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clap-to-jump
          path: build/*.geode
