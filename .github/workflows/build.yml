name: Build Geode Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Setup Geode CLI
        run: |
          curl -L https://github.com/geode-sdk/cli/releases/download/v3.7.0/geode-cli-linux.zip -o cli.zip
          unzip cli.zip -d cli_folder
          chmod +x cli_folder/geode
          sudo mv cli_folder/geode /usr/local/bin/geode

      - name: Install Geode SDK
        run: |
          geode sdk install --path $HOME/geode-sdk
          geode sdk install-binaries --platform android64

      - name: Build mod
        run: |
          export GEODE_SDK=$HOME/geode-sdk
          cmake -B build \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-23
          cmake --build build --config RelWithDebInfo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clap-to-jump
          path: build/*.geode
