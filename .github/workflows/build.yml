name: Build Geode Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Setup Geode CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download v3.7.0 \
            --repo geode-sdk/cli \
            --pattern "*x86_64-unknown-linux*" \
            --output geode-cli
          chmod +x geode-cli
          sudo mv geode-cli /usr/local/bin/geode
          geode --version

      - name: Install Geode SDK
        run: |
          geode sdk install --path $HOME/geode-sdk
          geode sdk install-binaries --platform android64

      - name: Build mod
        run: |
          export GEODE_SDK=$HOME/geode-sdk
          cmake -B build \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_TOOLCHAIN_FILE=$ANDR
