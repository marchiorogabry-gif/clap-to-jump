name: Build Geode Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Setup Geode CLI
        run: |
          ASSET_URL=$(curl -s https://api.github.com/repos/geode-sdk/cli/releases/latest \
            | grep "browser_download_url" \
            | grep "linux" \
            | grep -v ".zip" \
            | cut -d '"' -f 4)
          echo "Downloading: $ASSET_URL"
          curl -Lo geode "$ASSET_URL"
          chmod +x geode
          sudo mv geode /usr/local/bin/geode
          geode --version

      - name: Install Geode SDK
        run: |
          geode sdk install --path $HOME/geode-sdk
          geode sdk install-binaries --platform android64

      - name: Build mod
        run: |
          export GEODE_SDK=$HOME/geode-sdk
          cmake -B build \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-23
          cmake --build build --config RelWithDebInfo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clap-to-jump
          path: build/*.geode
